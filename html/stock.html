 status-message<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Barang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/stock.css">
</head>
<body>
  <div class="stock-dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z"/>
          </svg>
          <span>Administration</span>
        </div>
        <button class="mini-grid-button" type="button" aria-label="Menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="4" width="6" height="6" rx="1"/>
            <rect x="14" y="4" width="6" height="6" rx="1"/>
            <rect x="4" y="14" width="6" height="6" rx="1"/>
            <rect x="14" y="14" width="6" height="6" rx="1"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        <button class="nav-link active" id="dashboard-link" type="button" aria-label="Dashboard">
          <img class="nav-icon" src="../images/Iconly/Light/Home.svg" alt="" aria-hidden="true">
          <span>Dashboard</span>
        </button>
        <button class="nav-link" id="help-link" type="button" aria-label="Help">
          <img class="nav-icon" src="../images/Iconly/Light/Danger%20Circle.svg" alt="" aria-hidden="true">
          <span>Help</span>
        </button>
        <button class="nav-link" id="employee-link" type="button" aria-label="Employee">
          <img class="nav-icon" src="../images/Iconly/Light/3%20User.svg" alt="" aria-hidden="true">
          <span>Employee</span>
        </button>
        <button class="nav-link" id="settings-link" type="button" aria-label="Settings">
          <img class="nav-icon" src="../images/Iconly/Light/Setting.svg" alt="" aria-hidden="true">
          <span>Settings</span>
        </button>
      </nav>

      <button class="nav-link logout-link" id="logout-link" type="button" aria-label="Quit">
        <img class="nav-icon" src="../images/Iconly/Light/Logout.svg" alt="" aria-hidden="true">
        <span>Quit</span>
      </button>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1>Shop Name</h1>
      </header>

      <section class="stats-grid">
        <article class="stat-card" id="income-card" role="button" tabindex="0" aria-label="Open income page">
          <div>
            <h2>IDR. 10.000</h2>
            <p>In Come</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3zm3-1a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1zm13 4H5v7a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1z"/>
              <circle cx="16.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card" id="outcome-card" role="button" tabindex="0" aria-label="Open outcome page">
          <div>
            <h2>IDR. 20.000</h2>
            <p>Out Come</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3zm3-1a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1zm13 4H5v7a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1z"/>
              <circle cx="16.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card" id="cashier-card" role="button" tabindex="0" aria-label="Open cashier dashboard">
          <div>
            <h2>Cashier</h2>
            <p>Transaction</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2a10 10 0 1 0 10 10"/>
              <path d="M8 7h8M12 5v8M8 15h8"/>
              <path d="M18 2v5h-5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card stat-card-accent" id="stock-card" role="button" tabindex="0" aria-label="Open stock page">
          <div>
            <h2>400 Stock</h2>
            <p>Stock Item</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 7h10l1 3v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7zm2 0a3 3 0 0 1 6 0"/>
              <circle cx="9" cy="11" r="1"/>
              <circle cx="15" cy="11" r="1"/>
            </svg>
          </div>
        </article>
      </section>

      <section class="stock-panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">Stok barang</h2>
            <button class="new-stock-button" id="new-stock-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14M12 5v14"/>
              </svg>
              <span>New Stock</span>
            </button>
          </div>

          <label class="search-field">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"/>
              <path d="m20 20-3.5-3.5"/>
            </svg>
            <input id="search-stock" type="search" placeholder="Search Item">
          </label>
        </div>

        <div class="table-shell">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Date</th>
                <th>ID Name</th>
                <th>Price/pc</th>
                <th>Total</th>
                <th>Amount</th>
                <th>Profit</th>
                <th>Option</th>
              </tr>
            </thead>
            <tbody id="stock-table-body">
              <tr>
                <td>1.</td>
                <td>2021-11-08</td>
                <td>Paku Payung(E01)</td>
                <td>IDR.1000</td>
                <td>IDR.3000</td>
                <td>x3</td>
                <td>IDR.1500</td>
                <td>
                  <div class="option-pills">
                    <span class="pill-edit">Edit</span>
                    <span class="pill-delete">Hapus</span>
                  </div>
                </td>
              </tr>
              <tr>
                <td>2.</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="pager">
          <button class="pager-button" type="button" aria-label="Previous page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m14 6-6 6 6 6"/>
            </svg>
          </button>
          <span>1</span>
          <button class="pager-button" type="button" aria-label="Next page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m10 6 6 6-6 6"/>
            </svg>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/stock.js"></script>
</body>
</html>
