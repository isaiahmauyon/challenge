<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Barang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/stock.css">
</head>
<body>
  <div class="stock-dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z"/>
          </svg>
          <span>Administration</span>
        </div>
        <button class="mini-grid-button" type="button" aria-label="Menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="4" width="6" height="6" rx="1"/>
            <rect x="14" y="4" width="6" height="6" rx="1"/>
            <rect x="4" y="14" width="6" height="6" rx="1"/>
            <rect x="14" y="14" width="6" height="6" rx="1"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        <button class="nav-link active" id="dashboard-link" type="button" aria-label="Dashboard">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 11.5 12 6l7 5.5V19a2 2 0 0 1-2 2h-2v-6H9v6H7a2 2 0 0 1-2-2z"/>
          </svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-link" id="help-link" type="button" aria-label="Help">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 10v6M12 7h.01"/>
          </svg>
          <span>Help</span>
        </button>
        <button class="nav-link" id="employee-link" type="button" aria-label="Employee Absence">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 11a3 3 0 1 0-3-3 3 3 0 0 0 3 3zm-8 0a3 3 0 1 0-3-3 3 3 0 0 0 3 3zm8 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C23 14.17 18.33 13 16 13zM8 13c-.29 0-.62.02-.97.05C5.17 13.32 2 14.25 2 16.5V19h5v-2.5c0-.94.38-1.76 1.06-2.45A9.7 9.7 0 0 0 8 13z"/>
          </svg>
          <span>Employee Absence</span>
        </button>
        <button class="nav-link" id="settings-link" type="button" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m19.14 12.94.04-.94-.04-.94 2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22L16.39 6a7.08 7.08 0 0 0-1.63-.94l-.25-2.54a.5.5 0 0 0-.5-.44h-4a.5.5 0 0 0-.5.44L9.26 5.06c-.58.23-1.13.54-1.63.94L5.23 5.3a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58-.04.94.04.94-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.4-.7c.5.4 1.05.71 1.63.94l.25 2.54a.5.5 0 0 0 .5.44h4a.5.5 0 0 0 .5-.44l.25-2.54c.58-.23 1.13-.54 1.63-.94l2.4.7a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z"/>
          </svg>
          <span>Settings</span>
        </button>
      </nav>

      <button class="nav-link logout-link" id="logout-link" type="button" aria-label="Quit">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 17v-2H4V9h6V7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm3-1 1.41 1.41L20.83 11l-6.42-6.41L13 6l4 4h-7v2h7z"/>
        </svg>
        <span>Quit</span>
      </button>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1>Shop Name</h1>
      </header>

      <section class="stats-grid">
        <article class="stat-card" id="income-card" role="button" tabindex="0" aria-label="Open income page">
          <div>
            <h2>IDR. 10.000</h2>
            <p>In Come</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3zm3-1a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1zm13 4H5v7a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1z"/>
              <circle cx="16.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card" id="outcome-card" role="button" tabindex="0" aria-label="Open outcome page">
          <div>
            <h2>IDR. 20.000</h2>
            <p>Out Come</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3zm3-1a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1zm13 4H5v7a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1z"/>
              <circle cx="16.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card" id="cashier-card" role="button" tabindex="0" aria-label="Open cashier dashboard">
          <div>
            <h2>Cashier</h2>
            <p>Transaction</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2a10 10 0 1 0 10 10"/>
              <path d="M8 7h8M12 5v8M8 15h8"/>
              <path d="M18 2v5h-5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card stat-card-accent" id="stock-card" role="button" tabindex="0" aria-label="Open stock page">
          <div>
            <h2>400 Stock</h2>
            <p>Stock Item</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 7h10l1 3v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7zm2 0a3 3 0 0 1 6 0"/>
              <circle cx="9" cy="11" r="1"/>
              <circle cx="15" cy="11" r="1"/>
            </svg>
          </div>
        </article>
      </section>

      <section class="stock-panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">Stok barang</h2>
            <button class="new-stock-button" id="new-stock-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14M12 5v14"/>
              </svg>
              <span>New Stock</span>
            </button>
          </div>

          <label class="search-field">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"/>
              <path d="m20 20-3.5-3.5"/>
            </svg>
            <input id="search-stock" type="search" placeholder="Search Item">
          </label>
        </div>

        <div class="table-shell">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Date</th>
                <th>ID Name</th>
                <th>Price/pc</th>
                <th>Total</th>
                <th>Amount</th>
                <th>Profit</th>
                <th>Option</th>
              </tr>
            </thead>
            <tbody id="stock-table-body">
              <tr>
                <td>1.</td>
                <td>2021-11-08</td>
                <td>Paku Payung(E01)</td>
                <td>IDR.1000</td>
                <td>IDR.3000</td>
                <td>x3</td>
                <td>IDR.1500</td>
                <td>
                  <div class="option-pills">
                    <span class="pill-edit">Edit</span>
                    <span class="pill-delete">Hapus</span>
                  </div>
                </td>
              </tr>
              <tr>
                <td>2.</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="pager">
          <button class="pager-button" type="button" aria-label="Previous page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m14 6-6 6 6 6"/>
            </svg>
          </button>
          <span>1</span>
          <button class="pager-button" type="button" aria-label="Next page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m10 6 6 6-6 6"/>
            </svg>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/stock.js"></script>
</body>
</html>
