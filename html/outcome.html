<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/outcome.css">
</head>
<body>
  <div class="outcome-dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z"/>
          </svg>
          <span>Administrasi</span>
        </div>
        <button class="mini-grid-button" type="button" aria-label="Menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="4" width="6" height="6" rx="1"/>
            <rect x="14" y="4" width="6" height="6" rx="1"/>
            <rect x="4" y="14" width="6" height="6" rx="1"/>
            <rect x="14" y="14" width="6" height="6" rx="1"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        <button class="nav-link active" id="dashboard-link" type="button" aria-label="Dashboard">
          <img class="nav-icon" src="../images/Iconly/Light/Home.svg" alt="" aria-hidden="true">
          <span>Dashboard</span>
        </button>
        <button class="nav-link" id="help-link" type="button" aria-label="Help">
          <img class="nav-icon" src="../images/Iconly/Light/Danger%20Circle.svg" alt="" aria-hidden="true">
          <span>Help</span>
        </button>
        <button class="nav-link" id="employee-link" type="button" aria-label="Employee Absence">
          <img class="nav-icon" src="../images/Iconly/Light/3%20User.svg" alt="" aria-hidden="true">
          <span>Employee Absence</span>
        </button>
        <button class="nav-link" id="settings-link" type="button" aria-label="Settings">
          <img class="nav-icon" src="../images/Iconly/Light/Setting.svg" alt="" aria-hidden="true">
          <span>Settings</span>
        </button>
      </nav>

      <button class="nav-link logout-link" id="logout-link" type="button" aria-label="Quit">
        <img class="nav-icon" src="../images/Iconly/Light/Logout.svg" alt="" aria-hidden="true">
        <span>Quit</span>
      </button>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1>Shop Name</h1>
      </header>

      <section class="stats-grid">
        <article class="stat-card" id="income-card" role="button" tabindex="0" aria-label="Open income page">
          <div>
            <h2>IDR. 10.000</h2>
            <p>In Come</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3zm3-1a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1zm13 4H5v7a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1z"/>
              <circle cx="16.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card stat-card-accent" id="outcome-card" role="button" tabindex="0" aria-label="Open outcome page">
          <div>
            <h2>IDR. 20.000</h2>
            <p>Out Come</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3zm3-1a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1zm13 4H5v7a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1z"/>
              <circle cx="16.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card" id="cashier-card" role="button" tabindex="0" aria-label="Open cashier dashboard">
          <div>
            <h2>Cashier</h2>
            <p>Transaction</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2a10 10 0 1 0 10 10"/>
              <path d="M8 7h8M12 5v8M8 15h8"/>
              <path d="M18 2v5h-5"/>
            </svg>
          </div>
        </article>

        <article class="stat-card" id="stock-card" role="button" tabindex="0" aria-label="Open stock page">
          <div>
            <h2>400 Stock</h2>
            <p>Stock Item</p>
          </div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 7h10l1 3v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7zm2 0a3 3 0 0 1 6 0"/>
              <circle cx="9" cy="11" r="1"/>
              <circle cx="15" cy="11" r="1"/>
            </svg>
          </div>
        </article>
      </section>

      <section class="outcome-panel">
        <div class="outcome-header">
          <h2 class="panel-title">Outcome</h2>
          <div class="action-row">
            <button class="export-button" id="export-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v10"/>
                <path d="m8 10 4 4 4-4"/>
                <path d="M5 18h14"/>
              </svg>
              <span>Export to Excel</span>
            </button>
            <button class="export-button" id="add-needs-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              <span>Add Needs</span>
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Date</th>
                <th>Item Name</th>
                <th>Description</th>
                <th>Total Amount</th>
              </tr>
            </thead>
            <tbody id="outcome-table-body">
              <tr>
                <td>1.</td>
                <td>xx-xxx-xx</td>
                <td>xx-xxx-xx</td>
                <td>Paid</td>
                <td><button class="detail-button" type="button">Detail</button></td>
              </tr>
              <tr>
                <td>2.</td>
                <td>xx-xxx-xx</td>
                <td>xx-xxx-xx</td>
                <td>Debt</td>
                <td><button class="detail-button" type="button">Detail</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/outcome.js"></script>
</body>
</html>
